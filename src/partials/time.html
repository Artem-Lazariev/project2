<section class="time">
    <div class="time__box container">
        <h2 class="time__title">Калькулятор часу</h2>
        <div class="time__div">
            <label class="time__label">
                <input required class="time__input" placeholder="Введіть число" type="text">
                <button class="time__btn" type="button">
                    <svg class="time__icon">
                        <use href="/img/symbol-defs.svg#search"></use>
                    </svg>
                </button>
            </label>
            <p class="time__text">0 дн. 00:00:00</p>
        </div>
    </div>
</section>
